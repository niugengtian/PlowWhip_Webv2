      &lt;span class=&quot;text-muted&quot; id=&quot;pw-review-saved&quot; aria-live=&quot;polite&quot;&gt;&lt;/span&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;pw-section&quot; data-lens=&quot;all strategy&quot;&gt;
    &lt;h2&gt;1. 产品定义与不可动摇的边界&lt;/h2&gt;
    &lt;p class=&quot;pw-intro&quot;&gt;系统的稳定性来自“控制逻辑不用模型决定”，而不是来自更多 Agent 互相监督。&lt;/p&gt;
    &lt;div class=&quot;pw-callout&quot;&gt;&lt;strong&gt;目标优先关系&lt;/strong&gt;保障质量的前提下实现无人值守完成，尽量减少 Token 消费。质量是前提条件，无人值守完成是产品目标，低 Token 是全过程优化要求。&lt;/div&gt;
    &lt;div class=&quot;pw-grid-4&quot;&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;CLI Provider&lt;/h3&gt;&lt;p&gt;打工仔提供者。负责启动、恢复、轮转和释放 Session，不拥有业务状态。&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;CLI Session&lt;/h3&gt;&lt;p&gt;具体打工仔。绑定一个 Project Role，项目内跨 Task 顺序工作，项目结束释放。&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;Project Role&lt;/h3&gt;&lt;p&gt;岗位。定义职责、能力、允许工具和交付物，不等于固定官僚部门。&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;Task / Evidence&lt;/h3&gt;&lt;p&gt;业务真源。Task 状态、Artifact、Evidence 和预算决定进度与完成。&lt;/p&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;pw-callout&quot;&gt;&lt;strong&gt;一句话公式&lt;/strong&gt;稳定岗位与长期 Worker Session + 确定性 Python 控制面 + 最小上下文 + 证据验收 − 角色自由聊天 − 模型探活 − 无界恢复。&lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;pw-token&quot; class=&quot;pw-section&quot; data-lens=&quot;all token&quot;&gt;
    &lt;h2&gt;2. 怎么省 Token，为什么真的会省&lt;/h2&gt;
    &lt;p class=&quot;pw-intro&quot;&gt;减少 Token 不能牺牲质量或破坏无人值守闭环；它通过减少模型调用次数、重复上下文和模型参与控制的比例实现。&lt;/p&gt;
    &lt;div class=&quot;pw-equation&quot;&gt;&lt;code&gt;Task Token = Σ(Model Run 的 input + cached input + output)&lt;/code&gt;&lt;br&gt;Probe、Wake、Dispatch、Lease、PID/文件/网络检查、轮转判断、Tool、Verify 都必须是 0 模型 Token。&lt;/div&gt;
    &lt;table class=&quot;pw-table&quot;&gt;
      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;机制&lt;/th&gt;&lt;th&gt;怎么做&lt;/th&gt;&lt;th&gt;为什么省&lt;/th&gt;&lt;th&gt;如何证明&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td data-label=&quot;机制&quot;&gt;0 Token 控制循环&lt;/td&gt;&lt;td data-label=&quot;怎么做&quot;&gt;Scheduler 只查数据库、PID、锁、文件 stat、网络和截止时间。&lt;/td&gt;&lt;td data-label=&quot;为什么省&quot;&gt;不再用“你还活着吗/请继续”Prompt 维持自动化。&lt;/td&gt;&lt;td data-label=&quot;如何证明&quot;&gt;任何 Token 都必须关联 &lt;code&gt;model_run.started&lt;/code&gt;。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;机制&quot;&gt;Context Capsule&lt;/td&gt;&lt;td data-label=&quot;怎么做&quot;&gt;只注入目标、当前 Step、验收、相关 Convention、最新 Evidence、Artifact 引用和剩余预算。&lt;/td&gt;&lt;td data-label=&quot;为什么省&quot;&gt;不重放完整聊天、全量协议、旧日志和其他岗位历史。&lt;/td&gt;&lt;td data-label=&quot;如何证明&quot;&gt;记录 Capsule bytes、估算 Token、裁剪原因。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;机制&quot;&gt;Delta Handoff&lt;/td&gt;&lt;td data-label=&quot;怎么做&quot;&gt;Role 交接只传新增 Artifact、失败摘要、未完成 Step 和预算。&lt;/td&gt;&lt;td data-label=&quot;为什么省&quot;&gt;消灭 PM→审核→执行的逐层复述。&lt;/td&gt;&lt;td data-label=&quot;如何证明&quot;&gt;统计重复上下文避免量与 Evidence hash。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;机制&quot;&gt;Worker 稳定服务项目&lt;/td&gt;&lt;td data-label=&quot;怎么做&quot;&gt;同岗位 Session 在项目内跨 Task 顺序复用。&lt;/td&gt;&lt;td data-label=&quot;为什么省&quot;&gt;减少重复身份初始化、项目背景重建和授权说明。&lt;/td&gt;&lt;td data-label=&quot;如何证明&quot;&gt;统计新建 Session 数、复用 Task 数和轮转次数。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;机制&quot;&gt;本地验证优先&lt;/td&gt;&lt;td data-label=&quot;怎么做&quot;&gt;测试、lint、Schema、Git diff、HTTP 断言由 Python 执行。&lt;/td&gt;&lt;td data-label=&quot;为什么省&quot;&gt;能机器判定的结果不再调用 Reviewer 模型。&lt;/td&gt;&lt;td data-label=&quot;如何证明&quot;&gt;记录本地 Verify 替代的模型调用数。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;机制&quot;&gt;按风险增减流程&lt;/td&gt;&lt;td data-label=&quot;怎么做&quot;&gt;Economy: Execute→Verify；高风险才 Plan/Independent Review。&lt;/td&gt;&lt;td data-label=&quot;为什么省&quot;&gt;简单任务不支付固定官僚链成本。&lt;/td&gt;&lt;td data-label=&quot;如何证明&quot;&gt;按模式统计 Runs/Task。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;机制&quot;&gt;Task 总预算&lt;/td&gt;&lt;td data-label=&quot;怎么做&quot;&gt;Provider 切换、修复、Review 共享 max_runs/max_attempts/max_cost/deadline。&lt;/td&gt;&lt;td data-label=&quot;为什么省&quot;&gt;换 CLI 或 Session 不能获得新的无限重试空间。&lt;/td&gt;&lt;td data-label=&quot;如何证明&quot;&gt;预算耗尽必达终态或 needs_human。&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
    &lt;div class=&quot;pw-callout&quot;&gt;&lt;strong&gt;不做虚假承诺&lt;/strong&gt;产品上线前不宣称固定节省百分比。基准必须比较同一验收任务的总 Token、总 Model Runs、重复输入和最终通过率。&lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;pw-rotation&quot; class=&quot;pw-section&quot; data-lens=&quot;all token reliability&quot;&gt;
    &lt;h2&gt;3. 怎么轮转切割，为什么这样设计&lt;/h2&gt;
    &lt;p class=&quot;pw-intro&quot;&gt;轮转的目标不是删历史，而是让 Hot 始终小、Warm 可恢复、Cold 可审计，同时保证切割不会制造第二个真源。&lt;/p&gt;
    &lt;div class=&quot;pw-grid-3&quot;&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;Hot&lt;/h3&gt;&lt;p&gt;当前 Task、当前 Role、最新 Evidence、预算和最多 8 条有效 Convention。直接进入 Capsule。&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;Warm&lt;/h3&gt;&lt;p&gt;Project 计划、决策、最近消息块、Role Carry Forward、Artifact 摘要。按需读取。&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;Cold&lt;/h3&gt;&lt;p&gt;完整 Session transcript、工具日志、历史事件、归档文件。默认永不进入 Prompt。&lt;/p&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;table class=&quot;pw-table&quot;&gt;
      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;对象&lt;/th&gt;&lt;th&gt;默认触发&lt;/th&gt;&lt;th&gt;切割单位&lt;/th&gt;&lt;th&gt;保留策略&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td data-label=&quot;对象&quot;&gt;Role Session&lt;/td&gt;&lt;td data-label=&quot;默认触发&quot;&gt;软阈值约 3000 Token；硬阈值约 4000 Token；可配置&lt;/td&gt;&lt;td data-label=&quot;切割单位&quot;&gt;整个 Session generation&lt;/td&gt;&lt;td data-label=&quot;保留策略&quot;&gt;旧 Session released；新 Worker 继承 ≤300 Token Carry Forward&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;对象&quot;&gt;current.md&lt;/td&gt;&lt;td data-label=&quot;默认触发&quot;&gt;Token/bytes 双阈值；文件安全阈值 16384 bytes&lt;/td&gt;&lt;td data-label=&quot;切割单位&quot;&gt;完整行与结构化信号&lt;/td&gt;&lt;td data-label=&quot;保留策略&quot;&gt;当前文件只保留最新有效片段与 archive pointer&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;对象&quot;&gt;AGENT_COMMS.md&lt;/td&gt;&lt;td data-label=&quot;默认触发&quot;&gt;行数、bytes 或消息块超限&lt;/td&gt;&lt;td data-label=&quot;切割单位&quot;&gt;完整消息块&lt;/td&gt;&lt;td data-label=&quot;保留策略&quot;&gt;禁止从消息中间切断；重复 pointer 压成一个&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;对象&quot;&gt;DECISIONS / STATUS / NEXT_ACTION&lt;/td&gt;&lt;td data-label=&quot;默认触发&quot;&gt;行数与 bytes 超限&lt;/td&gt;&lt;td data-label=&quot;切割单位&quot;&gt;完整记录&lt;/td&gt;&lt;td data-label=&quot;保留策略&quot;&gt;Active 文件保留最新结论，旧记录按 hash 归档&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
    &lt;div class=&quot;pw-flow&quot; aria-label=&quot;原子轮转流程&quot;&gt;
      &lt;span class=&quot;pw-node&quot;&gt;标记 rotating&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;
      &lt;span class=&quot;pw-node&quot;&gt;冻结新 Task&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;
      &lt;span class=&quot;pw-node&quot;&gt;确定性 Carry Forward&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;
      &lt;span class=&quot;pw-node&quot;&gt;Archive + SHA-256&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;
      &lt;span class=&quot;pw-node&quot;&gt;replacement Session&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;
      &lt;span class=&quot;pw-node&quot; data-state=&quot;active&quot;&gt;generation + 1&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;pw-grid-2&quot;&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;为什么不让模型总结轮转&lt;/h3&gt;&lt;p&gt;模型总结本身花 Token、可能漏掉关键约束，还会把轮转变成新的失败点。Carry Forward 必须从结构化 Task、Evidence、Artifact 和近期信号确定性生成。&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;为什么保留完整 Cold Archive&lt;/h3&gt;&lt;p&gt;出现争议、审计、恢复或安全事件时仍可追溯；只是默认不喂回模型，避免“可观测性 = Prompt 膨胀”。&lt;/p&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;pw-workflow&quot; class=&quot;pw-section&quot; data-lens=&quot;all workflow&quot;&gt;
    &lt;h2&gt;4. 工作流泳道&lt;/h2&gt;
    &lt;p class=&quot;pw-intro&quot;&gt;蓝色控制动作 0 Token；紫色格才可能调用模型；绿色格是确定性验证。&lt;/p&gt;
    &lt;div class=&quot;pw-lanes&quot; role=&quot;img&quot; aria-label=&quot;从创建项目到释放 Worker 的工作流泳道&quot;&gt;
      &lt;div class=&quot;pw-lane-label pw-lane-head&quot;&gt;泳道&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell pw-lane-head&quot;&gt;1 启动&lt;/div&gt;&lt;div class=&quot;pw-lane-cell pw-lane-head&quot;&gt;2 建 Task&lt;/div&gt;&lt;div class=&quot;pw-lane-cell pw-lane-head&quot;&gt;3 派发&lt;/div&gt;&lt;div class=&quot;pw-lane-cell pw-lane-head&quot;&gt;4 执行&lt;/div&gt;&lt;div class=&quot;pw-lane-cell pw-lane-head&quot;&gt;5 验证&lt;/div&gt;&lt;div class=&quot;pw-lane-cell pw-lane-head&quot;&gt;6 收敛&lt;/div&gt;&lt;div class=&quot;pw-lane-cell pw-lane-head&quot;&gt;7 结束&lt;/div&gt;
      &lt;div class=&quot;pw-lane-label&quot;&gt;人 / Web&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;1 启动&quot; data-mark=&quot;control&quot;&gt;创建 Project、Role、预算；授权系统 Scheduler&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;2 建 Task&quot; data-mark=&quot;control&quot;&gt;提交 Goal、Acceptance、权限&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;3 派发&quot;&gt;观察，不介入&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;4 执行&quot;&gt;可 Pause / Cancel&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;5 验证&quot;&gt;只看 Evidence&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;6 收敛&quot;&gt;必要时回答 Decision&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;7 结束&quot;&gt;接受结果或归档&lt;/div&gt;
      &lt;div class=&quot;pw-lane-label&quot;&gt;OS Scheduler&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;1 启动&quot; data-mark=&quot;control&quot;&gt;launchd / systemd / Task Scheduler&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;2 建 Task&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;3 派发&quot; data-mark=&quot;control&quot;&gt;周期启动唯一 Tick&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;4 执行&quot; data-mark=&quot;control&quot;&gt;崩溃后再次拉起&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;5 验证&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;6 收敛&quot; data-mark=&quot;control&quot;&gt;合并 missed ticks&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;7 结束&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-lane-label&quot;&gt;Global Tick&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;1 启动&quot; data-mark=&quot;control&quot;&gt;OS/配置/权限 Preflight&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;2 建 Task&quot; data-mark=&quot;control&quot;&gt;扫描 Task 状态&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;3 派发&quot; data-mark=&quot;control&quot;&gt;lease + fencing + 幂等 Claim&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;4 执行&quot; data-mark=&quot;control&quot;&gt;PID/Session/heartbeat 探测&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;5 验证&quot; data-mark=&quot;control&quot;&gt;收割 Worker 结果&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;6 收敛&quot; data-mark=&quot;control&quot;&gt;重试/熔断/轮转判断&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;7 结束&quot; data-mark=&quot;control&quot;&gt;Release Barrier&lt;/div&gt;
      &lt;div class=&quot;pw-lane-label&quot;&gt;Orchestrator&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;1 启动&quot; data-mark=&quot;control&quot;&gt;创建投影&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;2 建 Task&quot; data-mark=&quot;control&quot;&gt;校验 revision / budget&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;3 派发&quot; data-mark=&quot;control&quot;&gt;编译 Capsule&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;4 执行&quot; data-mark=&quot;control&quot;&gt;状态 reducer&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;5 验证&quot; data-mark=&quot;control&quot;&gt;应用 Verify 结果&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;6 收敛&quot; data-mark=&quot;control&quot;&gt;证据门与停止条件&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;7 结束&quot; data-mark=&quot;control&quot;&gt;终态不可自动离开&lt;/div&gt;
      &lt;div class=&quot;pw-lane-label&quot;&gt;Role Worker&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;1 启动&quot;&gt;Provider 已绑定，未发 Prompt&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;2 建 Task&quot;&gt;等待岗位队列&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;3 派发&quot; data-mark=&quot;control&quot;&gt;启动/恢复 Session&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;4 执行&quot; data-mark=&quot;model&quot;&gt;唯一显式 Model Run&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;5 验证&quot;&gt;提交 Artifact，不自称完成&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;6 收敛&quot; data-mark=&quot;model&quot;&gt;只有新 Evidence 才修复&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;7 结束&quot; data-mark=&quot;control&quot;&gt;Session released&lt;/div&gt;
      &lt;div class=&quot;pw-lane-label&quot;&gt;Tool / Verify&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;1 启动&quot; data-mark=&quot;control&quot;&gt;目录/命令/网络权限检查&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;2 建 Task&quot; data-mark=&quot;control&quot;&gt;验证命令预检&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;3 派发&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;4 执行&quot; data-mark=&quot;control&quot;&gt;白名单命令、文件、Git&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;5 验证&quot; data-mark=&quot;verify&quot;&gt;测试、lint、Schema、Diff&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;6 收敛&quot; data-mark=&quot;verify&quot;&gt;形成最短失败 Evidence&lt;/div&gt;
      &lt;div class=&quot;pw-lane-cell&quot; data-step=&quot;7 结束&quot; data-mark=&quot;verify&quot;&gt;最终证据归档&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;pw-callout&quot;&gt;&lt;strong&gt;为什么这样设计&lt;/strong&gt;人在控制面直接纠偏；Scheduler 负责重复和恢复；Orchestrator 决定合法状态；Worker 只做专业工作；Verify 独立确认完成。任何一层故障都不会自动改写其他层的真相。&lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;pw-state&quot; class=&quot;pw-section&quot; data-lens=&quot;all workflow reliability&quot;&gt;
    &lt;h2&gt;5. 状态流转机制&lt;/h2&gt;
    &lt;p class=&quot;pw-intro&quot;&gt;每类对象只有一套合法状态；终态、租约和 generation 共同阻止旧进程复活任务。&lt;/p&gt;
    &lt;div class=&quot;pw-panel&quot;&gt;
      &lt;h3&gt;Project&lt;/h3&gt;
      &lt;div class=&quot;pw-flow&quot;&gt;&lt;span class=&quot;pw-node&quot;&gt;draft&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot;&gt;initializing&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot; data-state=&quot;active&quot;&gt;active&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot;&gt;completing&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot;&gt;releasing_workers&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot; data-state=&quot;terminal&quot;&gt;completed&lt;/span&gt;&lt;/div&gt;
      &lt;p class=&quot;text-muted&quot;&gt;取消同样先经过 releasing_workers；资源未收口时不能伪装 completed/cancelled。&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;pw-panel&quot;&gt;
      &lt;h3&gt;Task&lt;/h3&gt;
      &lt;div class=&quot;pw-flow&quot;&gt;&lt;span class=&quot;pw-node&quot;&gt;draft&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot;&gt;ready&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot; data-state=&quot;active&quot;&gt;running&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot;&gt;verifying&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot; data-state=&quot;terminal&quot;&gt;completed&lt;/span&gt;&lt;/div&gt;
      &lt;p class=&quot;text-muted&quot;&gt;任意非终态可进入 paused / needs_human / terminal_failed / cancelled；终态不能由后台扫描重新激活。&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;pw-panel&quot;&gt;
      &lt;h3&gt;Role Worker&lt;/h3&gt;
      &lt;div class=&quot;pw-flow&quot;&gt;&lt;span class=&quot;pw-node&quot;&gt;unassigned&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot;&gt;hiring&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot; data-state=&quot;active&quot;&gt;ready&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot;&gt;working&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot; data-state=&quot;active&quot;&gt;ready&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→&lt;/span&gt;&lt;span class=&quot;pw-node&quot; data-state=&quot;terminal&quot;&gt;released&lt;/span&gt;&lt;/div&gt;
      &lt;p class=&quot;text-muted&quot;&gt;rotating/replacing 创建 generation + 1；旧 generation 的迟到结果拒绝。&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;pw-panel&quot;&gt;
      &lt;h3&gt;Circuit Breaker&lt;/h3&gt;
      &lt;div class=&quot;pw-flow&quot;&gt;&lt;span class=&quot;pw-node&quot; data-state=&quot;active&quot;&gt;closed&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→ 失败阈值 →&lt;/span&gt;&lt;span class=&quot;pw-node&quot;&gt;open&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→ 到期 →&lt;/span&gt;&lt;span class=&quot;pw-node&quot;&gt;half_open&lt;/span&gt;&lt;span class=&quot;pw-arrow&quot;&gt;→ 连续成功 →&lt;/span&gt;&lt;span class=&quot;pw-node&quot; data-state=&quot;active&quot;&gt;closed&lt;/span&gt;&lt;/div&gt;
      &lt;p class=&quot;text-muted&quot;&gt;基础设施故障不消耗模型 Attempt；熔断器只允许单个 0 Token 探针，防止恢复风暴。&lt;/p&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;pw-unattended&quot; class=&quot;pw-section&quot; data-lens=&quot;all unattended security&quot;&gt;
    &lt;h2&gt;6. 无人值守自动完成：怎么实现、需要什么&lt;/h2&gt;
    &lt;p class=&quot;pw-intro&quot;&gt;无人值守完成建立在质量门之上：系统能自己推进、验证、恢复，并在无法保证质量或不该继续时可靠停止，而不是永远重试。&lt;/p&gt;
    &lt;div class=&quot;pw-grid-2&quot;&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;
        &lt;h3&gt;自动完成闭环&lt;/h3&gt;
        &lt;ol&gt;
          &lt;li&gt;用户提交 Goal、Acceptance、预算、项目和允许权限。&lt;/li&gt;
          &lt;li&gt;Preflight 在模型调用前发现目录、凭据、CLI、网络和验证缺失。&lt;/li&gt;
          &lt;li&gt;OS Scheduler 周期拉起 Global Tick；Tick 获取 leader lease。&lt;/li&gt;
          &lt;li&gt;公平扫描所有 Project/Role/Worker/Task，原子 Claim 合法 Task。&lt;/li&gt;
          &lt;li&gt;Context Compiler 生成最小 Capsule；Role Worker 启动或 Resume。&lt;/li&gt;
          &lt;li&gt;Tool Runner 执行获准动作；Verification Engine 独立验证。&lt;/li&gt;
          &lt;li&gt;通过则 Task 完成；失败只携最短新 Evidence 进入有界修复。&lt;/li&gt;
          &lt;li&gt;Project 全部收敛后执行 Worker Release Barrier 并归档。&lt;/li&gt;
        &lt;/ol&gt;
      &lt;/div&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;
        &lt;h3&gt;必要资源&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;本机 Python Runtime 与 FastAPI Web 服务。&lt;/li&gt;
          &lt;li&gt;SQLite WAL、Artifact/Archive 目录和足够磁盘空间。&lt;/li&gt;
          &lt;li&gt;一个用户级 OS Scheduler：launchd / systemd timer / Task Scheduler。&lt;/li&gt;
          &lt;li&gt;至少一个用户配置并已认证的 CLI Provider。&lt;/li&gt;
          &lt;li&gt;项目工作目录；代码项目可选 Git/worktree。&lt;/li&gt;
          &lt;li&gt;验证工具链：测试、lint、构建器或用户脚本。&lt;/li&gt;
          &lt;li&gt;网络仅在 Provider 或 Task 需要时开放；本地任务可以离线。&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;table class=&quot;pw-table&quot;&gt;
      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;权限&lt;/th&gt;&lt;th&gt;默认&lt;/th&gt;&lt;th&gt;粒度&lt;/th&gt;&lt;th&gt;为什么&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td data-label=&quot;权限&quot;&gt;安装系统定时任务&lt;/td&gt;&lt;td data-label=&quot;默认&quot;&gt;首次明确授权&lt;/td&gt;&lt;td data-label=&quot;粒度&quot;&gt;整套实例一次&lt;/td&gt;&lt;td data-label=&quot;为什么&quot;&gt;系统任务在浏览器关闭和 Python 崩溃后仍能拉起 Tick；不按项目重复安装。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;权限&quot;&gt;文件读写&lt;/td&gt;&lt;td data-label=&quot;默认&quot;&gt;仅项目根目录&lt;/td&gt;&lt;td data-label=&quot;粒度&quot;&gt;Project / Task&lt;/td&gt;&lt;td data-label=&quot;为什么&quot;&gt;防止 Worker 横向读取其他项目。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;权限&quot;&gt;子进程与命令&lt;/td&gt;&lt;td data-label=&quot;默认&quot;&gt;白名单 + 超时&lt;/td&gt;&lt;td data-label=&quot;粒度&quot;&gt;Task&lt;/td&gt;&lt;td data-label=&quot;为什么&quot;&gt;CLI、测试和工具需要执行，但不能获得无限 Shell。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;权限&quot;&gt;网络&lt;/td&gt;&lt;td data-label=&quot;默认&quot;&gt;关闭或 Provider 专用&lt;/td&gt;&lt;td data-label=&quot;粒度&quot;&gt;Provider / Task&lt;/td&gt;&lt;td data-label=&quot;为什么&quot;&gt;把依赖下载、外部 API 和本地任务分开，便于断网降级。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;权限&quot;&gt;Secret&lt;/td&gt;&lt;td data-label=&quot;默认&quot;&gt;引用，不回显&lt;/td&gt;&lt;td data-label=&quot;粒度&quot;&gt;Provider / 单次 Run&lt;/td&gt;&lt;td data-label=&quot;为什么&quot;&gt;短期环境注入，Project 结束随 Worker Release 清除。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;权限&quot;&gt;Git push / 发布&lt;/td&gt;&lt;td data-label=&quot;默认&quot;&gt;禁止&lt;/td&gt;&lt;td data-label=&quot;粒度&quot;&gt;Task + 人工批准&lt;/td&gt;&lt;td data-label=&quot;为什么&quot;&gt;本地修改与外部发布是不同风险等级。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;权限&quot;&gt;系统管理员/root&lt;/td&gt;&lt;td data-label=&quot;默认&quot;&gt;不需要&lt;/td&gt;&lt;td data-label=&quot;粒度&quot;&gt;无&lt;/td&gt;&lt;td data-label=&quot;为什么&quot;&gt;优先用户级 Scheduler；需要提权时必须单独说明原因。&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/section&gt;

  &lt;section id=&quot;pw-loop&quot; class=&quot;pw-section&quot; data-lens=&quot;all reliability&quot;&gt;
    &lt;h2&gt;7. 如何防止死循环与脑裂&lt;/h2&gt;
    &lt;p class=&quot;pw-intro&quot;&gt;死循环靠全局预算与证据门阻断；脑裂靠租约、fencing、CAS 和幂等键阻断。两者不能只靠“重试次数”。&lt;/p&gt;
    &lt;div class=&quot;pw-grid-2&quot;&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;
        &lt;h3&gt;防死循环&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;Task 共享 &lt;code&gt;max_runs / max_attempts / max_cost / deadline&lt;/code&gt;。&lt;/li&gt;
          &lt;li&gt;没有新 Evidence、人工决策或到期 retry_at，不得创建新 Model Run。&lt;/li&gt;
          &lt;li&gt;相同 failure_class + evidence_hash 去重，禁止原样再跑。&lt;/li&gt;
          &lt;li&gt;Provider/Session/Role 切换不重置 Task 预算。&lt;/li&gt;
          &lt;li&gt;completed/terminal_failed/cancelled 是吸收态。&lt;/li&gt;
          &lt;li&gt;基础设施失败进入 Circuit Breaker，不伪装为模型修复任务。&lt;/li&gt;
          &lt;li&gt;Review 最多固定轮数；冲突最多一次裁决。&lt;/li&gt;
          &lt;li&gt;通知、SSE、回执失败不能重新激活 Task。&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;
        &lt;h3&gt;防脑裂&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;Global Tick 先取得 SchedulerLease 与递增 fencing token。&lt;/li&gt;
          &lt;li&gt;每个 Task 同时只有一个 Execution Lease 和 active Attempt。&lt;/li&gt;
          &lt;li&gt;每个 Project Role 同时只有一个 active Worker generation。&lt;/li&gt;
          &lt;li&gt;所有写操作必须携带 expected revision，CAS 失败即重读。&lt;/li&gt;
          &lt;li&gt;派发幂等键：project + role + task + action + state_revision。&lt;/li&gt;
          &lt;li&gt;Claim、Event、Outbox 同一数据库事务提交。&lt;/li&gt;
          &lt;li&gt;旧 Scheduler、旧 Worker、旧 Session 的迟到结果全部拒绝。&lt;/li&gt;
          &lt;li&gt;PID/进程组仍存活时不能启动 replacement Worker。&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;pw-callout&quot;&gt;&lt;strong&gt;故障注入底线&lt;/strong&gt;连续 100 个崩溃、超时、重复请求、数据库锁、旧 revision、断网和验证失败场景：零重复 Model Run、零越过终态、零无限循环、零双 Worker。&lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;pw-network&quot; class=&quot;pw-section&quot; data-lens=&quot;all reliability operations&quot;&gt;
    &lt;h2&gt;8. 特殊情况：网络、飞行模式、本机休眠&lt;/h2&gt;
    &lt;p class=&quot;pw-intro&quot;&gt;国内链路、海外链路和本地链路独立探测，不把“某个 Provider 不通”误判成“整台机器断网”。选择场景查看确定性处理路径。&lt;/p&gt;
    &lt;div class=&quot;viz-controls&quot;&gt;
      &lt;label class=&quot;form-label&quot; for=&quot;pw-scenario-select&quot;&gt;场景
        &lt;select class=&quot;form-select&quot; id=&quot;pw-scenario-select&quot;&gt;
          &lt;option value=&quot;overseas&quot;&gt;海外网络不可用，国内网络正常&lt;/option&gt;
          &lt;option value=&quot;domestic&quot;&gt;国内网络不可用，海外网络正常&lt;/option&gt;
          &lt;option value=&quot;airplane&quot;&gt;飞行模式 / 全部网络不可用&lt;/option&gt;
          &lt;option value=&quot;sleep&quot;&gt;本机休眠后唤醒&lt;/option&gt;
          &lt;option value=&quot;provider&quot;&gt;单个 CLI Provider 故障&lt;/option&gt;
          &lt;option value=&quot;db&quot;&gt;SQLite 暂时锁定或磁盘抖动&lt;/option&gt;
        &lt;/select&gt;
      &lt;/label&gt;
    &lt;/div&gt;
    &lt;div class=&quot;pw-scenario-result&quot; id=&quot;pw-scenario-result&quot; aria-live=&quot;polite&quot;&gt;&lt;/div&gt;
    &lt;table class=&quot;pw-table&quot;&gt;
      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;分类依据&lt;/th&gt;&lt;th&gt;系统状态&lt;/th&gt;&lt;th&gt;仍可做什么&lt;/th&gt;&lt;th&gt;明确禁止&lt;/th&gt;&lt;th&gt;为什么&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td data-label=&quot;分类依据&quot;&gt;本地网关/DNS 失败；国内外探针都失败&lt;/td&gt;&lt;td data-label=&quot;系统状态&quot;&gt;offline / airplane&lt;/td&gt;&lt;td data-label=&quot;仍可做什么&quot;&gt;本地文件、Git、测试、轮转、队列维护&lt;/td&gt;&lt;td data-label=&quot;明确禁止&quot;&gt;网络 Model Run 和重复认证&lt;/td&gt;&lt;td data-label=&quot;为什么&quot;&gt;离线不是任务失败，重试只会烧时间和 Token。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;分类依据&quot;&gt;国内探针成功；海外 Provider 全失败&lt;/td&gt;&lt;td data-label=&quot;系统状态&quot;&gt;domestic_only&lt;/td&gt;&lt;td data-label=&quot;仍可做什么&quot;&gt;国内 Provider、本地 Worker、本地 Verify&lt;/td&gt;&lt;td data-label=&quot;明确禁止&quot;&gt;跨海外 Provider 连环切换&lt;/td&gt;&lt;td data-label=&quot;为什么&quot;&gt;隔离海外 Circuit，不拖住可运行项目。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;分类依据&quot;&gt;海外探针成功；国内服务失败&lt;/td&gt;&lt;td data-label=&quot;系统状态&quot;&gt;overseas_only&lt;/td&gt;&lt;td data-label=&quot;仍可做什么&quot;&gt;海外 Provider 和纯本地任务&lt;/td&gt;&lt;td data-label=&quot;明确禁止&quot;&gt;假定整机断网&lt;/td&gt;&lt;td data-label=&quot;为什么&quot;&gt;链路独立判断才能正确降级。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;分类依据&quot;&gt;唤醒后 wall clock 大幅跳变&lt;/td&gt;&lt;td data-label=&quot;系统状态&quot;&gt;resume_reconcile&lt;/td&gt;&lt;td data-label=&quot;仍可做什么&quot;&gt;合并成一次 catch-up Tick，重算租约/PID/截止时间&lt;/td&gt;&lt;td data-label=&quot;明确禁止&quot;&gt;补跑每一个错过的 Tick&lt;/td&gt;&lt;td data-label=&quot;为什么&quot;&gt;避免唤醒风暴和重复派发。&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
    &lt;div class=&quot;pw-grid-2&quot;&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;恢复规则&lt;/h3&gt;&lt;p&gt;网络恢复先进入 half_open，仅允许一个 0 Token 健康探针；默认连续 3 次成功后关闭 Circuit。Task Attempt 不因链路故障扣减。&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;时间规则&lt;/h3&gt;&lt;p&gt;进程超时使用单调时间；业务 deadline 使用 wall clock。休眠期间不补跑 Tick，但若业务截止已过则进入明确终态或 needs_human。&lt;/p&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;pw-conventions&quot; class=&quot;pw-section&quot; data-lens=&quot;all governance token&quot;&gt;
    &lt;h2&gt;9. Global / Project / Task 三种 Convention 作用域&lt;/h2&gt;
    &lt;p class=&quot;pw-intro&quot;&gt;Convention 是可编译、可追踪、按需注入的规则，不是一份每轮完整重读的 Handbook。&lt;/p&gt;
    &lt;div class=&quot;pw-scope-stack&quot;&gt;
      &lt;div class=&quot;pw-scope&quot; data-scope=&quot;global&quot;&gt;&lt;strong&gt;Global&lt;/strong&gt;&lt;span&gt;适用于所有项目：最小权限、状态真源、不得模型探活、终态保护、审计与预算底线。&lt;/span&gt;&lt;span&gt;稳定 ID，例如 &lt;code&gt;G-NO-MODEL-PROBE&lt;/code&gt;；默认不可被项目放宽。&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-scope&quot; data-scope=&quot;project&quot;&gt;&lt;strong&gt;Project&lt;/strong&gt;&lt;span&gt;项目技术栈、目录边界、角色定义、质量门、分支策略、Provider 偏好和交付方式。&lt;/span&gt;&lt;span&gt;覆盖一般偏好，但不能绕过 Global 安全/权限上限。&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-scope&quot; data-scope=&quot;task&quot;&gt;&lt;strong&gt;Task&lt;/strong&gt;&lt;span&gt;当前目标、验收、允许文件、网络、deadline、风险等级和一次性人工决策。&lt;/span&gt;&lt;span&gt;优先级最高但生命周期最短；扩权必须人工批准。&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;pw-equation&quot;&gt;&lt;code&gt;Effective Convention = immutable safety ∪ Global ∪ Project overrides ∪ Task constraints&lt;/code&gt;&lt;br&gt;冲突优先级：Task &amp;gt; Project &amp;gt; Global；但更窄作用域只能在授权边界内调整，不能静默放宽安全、Secret、网络和发布权限。&lt;/div&gt;
    &lt;div class=&quot;pw-grid-3&quot;&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;Convention Compiler&lt;/h3&gt;&lt;p&gt;按 Step 类型、Role、Capability 和风险标签选取最多 8 条有效规则，输出稳定 ID、action 与 on_violation。&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;为什么省 Token&lt;/h3&gt;&lt;p&gt;模型只看到当前动作有关的规则；完整规则保存在数据库与审计页，不在每轮重复注入。&lt;/p&gt;&lt;/div&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;为什么可治理&lt;/h3&gt;&lt;p&gt;每次 Run 保存 effective convention hash；规则变化后旧 Worker 不能用历史 Prompt 越权回写。&lt;/p&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;pw-roles&quot; class=&quot;pw-section&quot; data-lens=&quot;all roles governance token&quot;&gt;
    &lt;h2&gt;10. Web3 / IT 最小角色集&lt;/h2&gt;
    &lt;p class=&quot;pw-intro&quot;&gt;不复制 agency-agents-zh 的庞大组织结构，只参考其“身份、使命、关键规则、工作流、交付物”模板结构。系统默认预置 5 个能覆盖日常 Web3 与 IT 项目的岗位；UI、文档等低频能力作为能力包临时附加，不常驻一个 Worker。&lt;/p&gt;
    &lt;table class=&quot;pw-table&quot;&gt;
      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;最小岗位&lt;/th&gt;&lt;th&gt;覆盖范围&lt;/th&gt;&lt;th&gt;主要交付&lt;/th&gt;&lt;th&gt;启用策略&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td data-label=&quot;岗位&quot;&gt;协调负责人&lt;/td&gt;&lt;td data-label=&quot;覆盖范围&quot;&gt;目标澄清、Task 拆解、依赖、验收与发布决定&lt;/td&gt;&lt;td data-label=&quot;主要交付&quot;&gt;可执行任务图、风险、完成定义&lt;/td&gt;&lt;td data-label=&quot;启用策略&quot;&gt;每项目 1 个；小项目可由用户直接承担&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;岗位&quot;&gt;全栈工程师&lt;/td&gt;&lt;td data-label=&quot;覆盖范围&quot;&gt;前端、后端、API、数据库与常规脚本&lt;/td&gt;&lt;td data-label=&quot;主要交付&quot;&gt;可运行代码、迁移、测试与证据&lt;/td&gt;&lt;td data-label=&quot;启用策略&quot;&gt;IT 项目默认；可按并行度增加 Worker&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;岗位&quot;&gt;Web3 工程师&lt;/td&gt;&lt;td data-label=&quot;覆盖范围&quot;&gt;合约、链上交互、钱包、RPC、Indexer 与 Token 逻辑&lt;/td&gt;&lt;td data-label=&quot;主要交付&quot;&gt;合约或链上集成、测试网证据、风险说明&lt;/td&gt;&lt;td data-label=&quot;启用策略&quot;&gt;检测到 Web3 技术栈时启用&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;岗位&quot;&gt;DevOps / SRE&lt;/td&gt;&lt;td data-label=&quot;覆盖范围&quot;&gt;CI/CD、容器、云资源、网络、监控与恢复&lt;/td&gt;&lt;td data-label=&quot;主要交付&quot;&gt;可部署运行时、Runbook、恢复验证&lt;/td&gt;&lt;td data-label=&quot;启用策略&quot;&gt;存在部署、运行环境或故障任务时启用&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;岗位&quot;&gt;审查与验证&lt;/td&gt;&lt;td data-label=&quot;覆盖范围&quot;&gt;QA、代码审查、基础安全、交付证据&lt;/td&gt;&lt;td data-label=&quot;主要交付&quot;&gt;独立验证结果、缺陷、发布结论&lt;/td&gt;&lt;td data-label=&quot;启用策略&quot;&gt;发布、高风险变更或 Strict 模式启用&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
    &lt;div class=&quot;pw-grid-2&quot;&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;
        &lt;h3&gt;Prompt 编译栈&lt;/h3&gt;
        &lt;ol&gt;
          &lt;li&gt;不可覆盖的 Runtime Safety。&lt;/li&gt;
          &lt;li&gt;Global / Project / Task 有效 Convention。&lt;/li&gt;
          &lt;li&gt;角色模板的 Identity、Mission、Workflow、Deliverables。&lt;/li&gt;
          &lt;li&gt;当前 Task 的最小 Context Capsule。&lt;/li&gt;
          &lt;li&gt;结构化 Output Schema 与剩余预算。&lt;/li&gt;
        &lt;/ol&gt;
      &lt;/div&gt;
      &lt;div class=&quot;pw-panel&quot;&gt;
        &lt;h3&gt;少角色、能力包策略&lt;/h3&gt;
        &lt;ul&gt;
          &lt;li&gt;安装包只带上述 5 个紧凑角色，不内置 266 个角色目录。&lt;/li&gt;
          &lt;li&gt;&lt;code&gt;ui-ux&lt;/code&gt;、&lt;code&gt;technical-writing&lt;/code&gt;、&lt;code&gt;data-analysis&lt;/code&gt; 等作为能力包，在具体 Task 上临时附加。&lt;/li&gt;
          &lt;li&gt;角色创建发生在项目需要时，不因模板存在就提前雇用 Worker。&lt;/li&gt;
          &lt;li&gt;参考模板固定 upstream commit 与 template hash；二次分发保留 MIT 版权与许可声明。&lt;/li&gt;
          &lt;li&gt;项目可裁剪职责，但不能绕过 Convention 的安全和权限边界。&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;pw-callout&quot;&gt;&lt;strong&gt;关键判断&lt;/strong&gt;岗位只负责稳定分工，能力包负责偶发专业能力，Convention 负责不可违反的约束，Task Capsule 负责眼前工作。默认岗位越少，空闲会话、重复交接和 Prompt Token 越少。&lt;/div&gt;
  &lt;/section&gt;

      &lt;div class=&quot;pw-panel&quot;&gt;&lt;h3&gt;异常可行动&lt;/h3&gt;&lt;p&gt;每个异常给一个结论、证据和下一动作，不让用户翻几十条日志。&lt;/p&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;pw-section&quot; data-lens=&quot;all ui reliability&quot;&gt;
    &lt;h2&gt;12. 每个项目 Worker 状态页面&lt;/h2&gt;
    &lt;p class=&quot;pw-intro&quot;&gt;Project 页面把 Role、CLI Provider、Session、Task 和预算放在一条可核对的链上。&lt;/p&gt;
    &lt;div class=&quot;pw-wire&quot; aria-label=&quot;项目 Worker 状态页面线框&quot;&gt;
      &lt;div class=&quot;pw-wire-top&quot;&gt;&lt;div&gt;&lt;strong&gt;Project: plow-whip Web v2&lt;/strong&gt;&lt;div class=&quot;text-muted&quot;&gt;active · Economy/Balanced · 41% budget&lt;/div&gt;&lt;/div&gt;&lt;div&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot;&gt;Pause&lt;/button&gt; &lt;button type=&quot;button&quot; class=&quot;btn&quot;&gt;Cancel&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;

  &lt;/section&gt;

  &lt;section class=&quot;pw-section&quot; data-lens=&quot;all decision&quot;&gt;
    &lt;h2&gt;13. 产品决策与验收底线&lt;/h2&gt;
    &lt;table class=&quot;pw-table&quot;&gt;
      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;问题&lt;/th&gt;&lt;th&gt;决定&lt;/th&gt;&lt;th&gt;验收证据&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;td data-label=&quot;问题&quot;&gt;产品目标如何定义&lt;/td&gt;&lt;td data-label=&quot;决定&quot;&gt;保障质量的前提下实现无人值守完成，尽量减少 Token 消费&lt;/td&gt;&lt;td data-label=&quot;验收证据&quot;&gt;Token 优化不得跳过质量门；无法可靠完成的任务进入明确阻塞态。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;问题&quot;&gt;控制面是否依赖 Desktop&lt;/td&gt;&lt;td data-label=&quot;决定&quot;&gt;不依赖；浏览器 + Python Backend&lt;/td&gt;&lt;td data-label=&quot;验收证据&quot;&gt;浏览器关闭、Desktop 不存在时仍可 Tick、执行、验证和恢复。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;问题&quot;&gt;CLI 是否是业务真源&lt;/td&gt;&lt;td data-label=&quot;决定&quot;&gt;不是；CLI 是 Worker Provider&lt;/td&gt;&lt;td data-label=&quot;验收证据&quot;&gt;Session 丢失后从 Task/Event/Evidence 恢复，不猜聊天历史。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;问题&quot;&gt;项目是否并行&lt;/td&gt;&lt;td data-label=&quot;决定&quot;&gt;并行；项目/Role/Provider/资源四层限流&lt;/td&gt;&lt;td data-label=&quot;验收证据&quot;&gt;一个项目熔断、暂停或预算耗尽不阻塞其他项目。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;问题&quot;&gt;Scheduler 是否高可用&lt;/td&gt;&lt;td data-label=&quot;决定&quot;&gt;一个 OS Job，多次幂等 Tick，SQLite lease/fencing&lt;/td&gt;&lt;td data-label=&quot;验收证据&quot;&gt;任意崩溃点恢复后零双 Worker、零重复 Model Run。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;问题&quot;&gt;预置多少角色&lt;/td&gt;&lt;td data-label=&quot;决定&quot;&gt;只内置 5 个 Web3 / IT 岗位；低频专业能力采用 Task 能力包&lt;/td&gt;&lt;td data-label=&quot;验收证据&quot;&gt;新项目只创建实际需要的 Worker；Role Prompt 与能力包 Token 可分别观测。&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td data-label=&quot;问题&quot;&gt;项目何时真正完成&lt;/td&gt;&lt;td data-label=&quot;决定&quot;&gt;Task 验收 + Worker Release Barrier&lt;/td&gt;&lt;td data-label=&quot;验收证据&quot;&gt;无 active Worker、PID、Lease、临时 Secret 或可 Resume binding。&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/section&gt;

      var value = {};
      statusEls.forEach(function (el) {
        value[el.dataset.key] = value[el.dataset.key] || {};
        value[el.dataset.key].status = el.value;
      });
      noteEls.forEach(function (el) {
        value[el.dataset.key] = value[el.dataset.key] || {};
        value[el.dataset.key].note = el.value;
      });
      return value;
    }

    function persist() {
      try {
        localStorage.setItem(storageKey, JSON.stringify(readReview()));
        saved.textContent = &#x27;已保存到本机&#x27;;
      } catch (e) {
        saved.textContent = &#x27;当前环境无法保存&#x27;;
      }
    }

    function restore() {
      try {
        var data = JSON.parse(localStorage.getItem(storageKey) || &#x27;{}&#x27;);
        statusEls.forEach(function (el) {
          if (data[el.dataset.key] &amp;&amp; data[el.dataset.key].status) el.value = data[el.dataset.key].status;
        });
        noteEls.forEach(function (el) {
          if (data[el.dataset.key] &amp;&amp; data[el.dataset.key].note) el.value = data[el.dataset.key].note;
        });
      } catch (e) {
        saved.textContent = &#x27;当前环境无法读取本机记录，可继续填写并导出&#x27;;
      }
    }

    statusEls.concat(noteEls).forEach(function (el) {
      el.addEventListener(&#x27;change&#x27;, persist);
      if (el.tagName === &#x27;TEXTAREA&#x27;) el.addEventListener(&#x27;input&#x27;, persist);
    });

    root.querySelector(&#x27;#pw-export-review&#x27;).addEventListener(&#x27;click&#x27;, function () {
      var payload = {
        document: &#x27;plow-whip Web v2 product review&#x27;,
        exported_at: new Date().toISOString(),
        review: readReview()
      };
      var blob = new Blob([JSON.stringify(payload, null, 2)], { type: &#x27;application/json&#x27; });
      var url = URL.createObjectURL(blob);
      var link = document.createElement(&#x27;a&#x27;);
      link.href = url;
      link.download = &#x27;plow-whip-web-v2-review.json&#x27;;
      link.click();
      URL.revokeObjectURL(url);
    });

    root.querySelector(&#x27;#pw-clear-review&#x27;).addEventListener(&#x27;click&#x27;, function () {
      statusEls.forEach(function (el) { el.value = &#x27;待审&#x27;; });
      noteEls.forEach(function (el) { el.value = &#x27;&#x27;; });
      try { localStorage.removeItem(storageKey); } catch (e) {}
      saved.textContent = &#x27;已清空&#x27;;
    });

    var scenarios = {
      overseas: {
        title: &#x27;海外网络不可用，国内网络正常&#x27;,
        steps: [&#x27;独立探测确认 domestic=online、overseas=offline。&#x27;, &#x27;只打开海外 CLI/Provider Circuit，不冻结全局 Scheduler。&#x27;, &#x27;国内 Provider、本地 Tool/Verify 和无需网络的 Task 继续。&#x27;, &#x27;海外 Task 进入 waiting_connectivity，不扣模型 Attempt。&#x27;, &#x27;连续 3 次 0 Token half-open 探针成功后恢复一个有界批次。&#x27;],
        reason: &#x27;把链路故障限制在最小作用域，避免跨 Provider 盲重试和全项目停摆。&#x27;
      },
      domestic: {
        title: &#x27;国内网络不可用，海外网络正常&#x27;,
        steps: [&#x27;独立确认 overseas Provider 可达。&#x27;, &#x27;冻结依赖国内 API、镜像源或企业服务的 Task。&#x27;, &#x27;海外 Provider 与纯本地 Task 继续。&#x27;, &#x27;不把国内 DNS/服务错误分类成全局断网。&#x27;, &#x27;恢复后先验证依赖端点，再释放对应 Task。&#x27;],
        reason: &#x27;网络不是单一布尔值；按依赖端点分类才能正确降级。&#x27;
      },
      airplane: {
        title: &#x27;飞行模式 / 全部网络不可用&#x27;,
        steps: [&#x27;本地网关、DNS、国内与海外探针共同确认 offline。&#x27;, &#x27;打开全局 Network Circuit，停止所有网络 Model Run 和认证尝试。&#x27;, &#x27;本地文件、Git、轮转、测试与队列维护继续。&#x27;, &#x27;网络 Task 进入 waiting_connectivity，不消耗 Attempt/Token。&#x27;, &#x27;恢复后只放行一个 half-open 探针，防止并发恢复风暴。&#x27;],
        reason: &#x27;飞行模式期间重复唤醒模型必然失败；保留本地工作能继续产生确定性进展。&#x27;
      },
      sleep: {
        title: &#x27;本机休眠后唤醒&#x27;,
        steps: [&#x27;OS Persistent Timer 唤醒一次 Tick。&#x27;, &#x27;比较 wall clock 与上次 heartbeat，进入 resume_reconcile。&#x27;, &#x27;重扫 PID、Worker generation、Task Lease 和数据库 Claim。&#x27;, &#x27;合并所有错过的 Tick，只执行一次有界 catch-up。&#x27;, &#x27;过期业务 deadline 进入明确终态或 needs_human；不回放旧派发。&#x27;],
        reason: &#x27;逐个补跑错过的 Tick 会制造唤醒风暴、重复 Claim 和脑裂。&#x27;
      },
      provider: {
        title: &#x27;单个 CLI Provider 故障&#x27;,
        steps: [&#x27;按错误类别区分认证、额度、限流、网络和 CLI 崩溃。&#x27;, &#x27;只打开该 Provider Circuit。&#x27;, &#x27;当前 Worker 保存 Evidence 并撤销进程 Lease。&#x27;, &#x27;策略允许时为同 Role 雇用 replacement Worker；Task 总预算不重置。&#x27;, &#x27;其他 Provider、Role 和 Project 继续。&#x27;],
        reason: &#x27;Provider 是资源，不是 Task 身份；故障隔离不能扩大成全局恢复循环。&#x27;
      },
      db: {
        title: &#x27;SQLite 暂时锁定或磁盘抖动&#x27;,
        steps: [&#x27;写事务失败时不启动任何外部 Worker。&#x27;, &#x27;使用短退避重试数据库，不重试模型。&#x27;, &#x27;无法确认 Claim 提交时按“未派发”处理。&#x27;, &#x27;下一个持有 fencing token 的 Tick 重扫 Outbox 与未完成 Claim。&#x27;, &#x27;持续失败进入 global needs_attention，保持现有 Worker 可被安全回收。&#x27;],
        reason: &#x27;先持久化 Claim 再产生副作用，才能避免“数据库说没启动、实际启动了两次”。&#x27;
      }
    };

    function renderScenario(key) {
      var value = scenarios[key] || scenarios.overseas;
      var box = root.querySelector(&#x27;#pw-scenario-result&#x27;);
      box.replaceChildren();
      var heading = document.createElement(&#x27;h3&#x27;);
      heading.textContent = value.title;
      var list = document.createElement(&#x27;ol&#x27;);
      value.steps.forEach(function (step) {
        var item = document.createElement(&#x27;li&#x27;);
        item.textContent = step;
        list.appendChild(item);
      });
      var reason = document.createElement(&#x27;p&#x27;);
      var strong = document.createElement(&#x27;strong&#x27;);
      strong.textContent = &#x27;为什么：&#x27;;
      reason.appendChild(strong);
      reason.appendChild(document.createTextNode(value.reason));
      box.appendChild(heading);
      box.appendChild(list);
      box.appendChild(reason);
    }

    var scenarioSelect = root.querySelector(&#x27;#pw-scenario-select&#x27;);
    scenarioSelect.addEventListener(&#x27;change&#x27;, function () { renderScenario(scenarioSelect.value); });
    restore();
    renderScenario(scenarioSelect.value);
  })();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });

  if (globalThis.lucide != null) {
    initialize();

    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
